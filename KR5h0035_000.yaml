front:
  text: 長生詮經卷第槐三
  hash: sha256:fdcc31c2c1d72e7bdc94d31459f49f627f1ac3786d34557a7ecb4896d17ffd00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0035_HFL_000-001a, image: hfl/1082/1082-004.png}
body:
  text: 清淨經夫人神好清而心擾之人心好靜而欲牽之常能遺其欲而心自靜澄其心而神自清內觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟唯見於空觀空亦空空無所空所空既無無無亦無無無亦無湛然常寂陰符經心生於物死於物機在目生者死之根死者生之根恩生於害害生於恩洞古經有動之動出於不動有為之為出於無為無為則神歸神歸則萬物云寂不動則氣泯則萬物無生忘於目則光溢無極泯於耳則心識常淵兩機俱忘衆妙之門養其無象象故常存守其無體體故全真全真相濟可以長生天得其真故長地得其真故久人得其真故壽大通經靜為之性心在其中矣動為之心性在其中矣心生性滅心滅性現如空無象湛然圓滿大道無相故內不攝於有真性無為故外不生其心如如自然廣無邊際對境忘境不沉於六賊之魔居塵出塵不落於萬緣之化定觀經唯滅動心不滅照心但凝空心不凝住心有事無事常若無心處靜處喧其志唯一制而不著放而不動處喧無惡涉事無惱者此是真定不以涉事無惱故求多事不以處喧無惡强來就喧以無事為真宅有為為應迹若水鏡之為鑒則隨物而現形胎息經胎從伏氣中結氣從有胎中息氣入身來為之生神去離形為之死知神氣可以長生固守虛無以養神氣神行即氣行神住即氣住若欲長生神氣相注胎息銘三十六咽一咽為先吐唯細細納唯綿綿坐卧亦爾行立坦然戒於喧雜忌以腥羶假名胎息實曰內丹非止治病决定延年久久行之名列上仙太上日用經日用飲食禁口端坐莫起一念萬慮俱忘存神定意眼不視物耳不聽聲一心內守調息綿綿漸漸呼出莫教間斷似有若無自然心火下降腎水上升口裏津生靈真附體得至長生十二時中常要清淨神是氣之子氣是神之母如雞抱卵存神養氣能無離乎心印經上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃刻而成回風混合百日功靈默朝上帝一紀飛升水火真經欲從心起息從心定心息相依息調心靜文始經心感物不生心生精功交心不生物生識物尚非真何况於識識尚非真何况於情目視雕琢者明愈傷耳聞文響者聰愈傷心思玄妙者心愈傷以神存氣以氣存形所以延形合形於神合氣於氣所以隱形吸氣以養其和孰能飢之存神以滋其暖孰能寒之洞靈經導筋骨則形全剪情欲則神全靖言語則福全保此三全是謂聖賢玉樞經道者以誠而入以默而守以柔而用用誠似愚用默似訥用柔似拙入道者知止守道者知謹用道者知微能知微則慧光生能知謹則聖知全能知上則泰安定冲虛經務外遊不如務內觀外遊者求備於物內觀者取足於身至游者不知所適至觀者不知所視神遇為夢形接為事晝想夜夢神形所交故神凝者想夢自消南華經山木自寇也膏火自煎也桂可食故伐之可用故割之人皆知有用之用而莫知無用之用也至道之精窈窈冥冥至道之極昏昏默默無勞女形無搖女精乃可長生目無所見耳無所聞心無所知女神將守形形乃長生三茅真經谷虛應聲心虛應神神虛應氣氣虛應精虛極則明明極則瑩超乎精神而無死生精從內守氣自外生以氣取精可以長生衛生經精氣神為內三寶耳目口為外三寶當使內三寶不逐物而流外三寶不誘中而擾洞神真經寵辱不驚肝木自寧動靜以敬心火自定飲食有節脾土不泄調息寡言肺金自全恬靜無欲腎水自足元道真經草木根生去土則死魚鱉沉生去水則死人以形生去氣則死是故聖人知氣之所在以為身寶漢天師語虛無大道清淨希夷不染曰清不動曰淨不視曰希不聽曰夷勤此四者可免輪回純陽真人一日清間一日仙六神和合自安然丹田有寶休尋道對境無心莫問禪養氣忘言守降心為不為動靜知宗祖無事更尋誰真常須應物應物要不迷不迷性自住性住氣自回氣回丹自結壺中配坎離陰陽生返復普化一聲雷白雲朝頂上甘露灑須彌自飲長生酒逍遙誰得知坐聽無絃曲明通造化機都來二十句端的上天梯虛靜天師不怕念起惟恐覺遲念起是病不續是藥有定主無常應心欲死機欲活大道不遠在身中萬物皆空性不空性若不空和氣住氣歸元海壽無窮欲得身中神不出莫向靈臺留一物物在心中神不清耗散真精損筋骨元神一出便收來神返身中氣自回如此朝朝併暮暮自然赤子産真胎李真人一吸便提氣氣歸臍一提便咽水火相見三茅真君靈臺湛湛似氷壺只許元神在裡居若向此中留一物豈能證道合清虛寒山子冬則朝勿饑夏則夜勿飽早起不在雞鳴前晚起不過日出後心內澄則真人守其位氣內定則邪穢去其身玉虛子物物元無物心非形亦非二般觀曉悟悟者不知誰無無藏妙有有有現真空湛然俱不立常寂性融融中黃真人天門常開地户須閉息息綿綿勿令暫廢吸至於根呼至於蒂子謂之神母謂之氣如雞抱𡖉似魚在水結就聖胎自然蟬蛻馬丹陽道性雖無修無證塵心要日損日消消到忘心忘性方𢍆無修無證煉氣作生涯怡神為日用常教龍虎調不使馬猿美性定則情忘形虛則氣運心死則神活陽盛則陰衰修心要作長生客煉性當為活死人玄關祕論心牽于事火動于中心火既動真精必搖故當死心以養氣息機以死心無心干事則無事於心故心靜生慧心動生昏郝太古境殺心則凡心殺境則仙靜處煉氣鬧處煉神王棲雲心隨境轉境逐心生若要心定世人愛的我不愛世人做的我不做紅塵萬緣勾引不動自然心清意靜陰陽不能陶鑄遣欲澄心亦是心將心擒欲欲應深爭如不起群迷念方現無中百煉金白玉蟾大道以無心為體忘言為用柔弱為本清淨為基薄滋味以養氣去嗔怒以養性處卑下以養德守清淨以養道真火本無候大藥不計斤蓋神既火氣即藥以火煉藥而成丹即以神馭氣而成道也使神馭氣使氣歸神不過回光返照收拾念頭之一法耳夫金丹者採二八兩之藥結三百日之胎心上工夫不在吞津咽氣先天造化要須聚氣凝神皆要行持須憑口訣至簡至易非繁非難無中養就嬰兒陰內煉成陽氣使金公生擒活虎令姹女獨駕赤龍乾夫坤婦而媒假黃婆離女坎男而結成赤子一爐火焰煉虛空化作微塵萬頃氷壺照世界大如黍米神歸四大即龜蛇交合之時氣入四肢是烏兔鬱羅之處玉葫蘆迸出黃金之液金菡萏開成白玉之花正當風泠月明時誰會山青水緑意快活快活真快活虛空粉碎秋毫末輪回生死幾千遭這回大死今方活舊時窠舊潑生涯于今淨盡都掉脫元來爹爹只是爺懵懵懂懂自瓜葛近來仿佛辨西東七七依前四十八如龍養珠心不忘如雞抱邜氣不絶又似寒蟬吸曉風又似老蚌含秋月一箇間人天地間大笑一聲天地闊我有明珠光爍爍照破三千大千國觀音菩薩正定心釋迦如來大圓覺或如春色媚山河或似秋光爽巖壑亦名九轉大還丹又謂長生不死藥墻璧瓦礫相渾融水鳥𣗳林共寥廓缺唇石女駕土牛跛腳木人騎紙鶴三業三毒雲去來六根六塵月綽約此珠價大實難酬不許巧錐妄穿鑿若要祕密大總持寂滅之中閉摸索幾多衲子聽蟄雷我個道人藏尺蠖茫茫盡向珠外求不識先天那一著那一著何須重注腳杜宇聲隨曉雨啼海棠夜聽東風落烏兔乾坤鼎龜蛇復姤壇世問無事客心內大還丹白虎水中吼青龍火裏蟠汞鉛泥蕊艷金木雪花寒離坎非心賢東西不肺肝三旬窮七返九轉出泥丸司馬真人夫欲修真先除邪行外事都絶無以於心然後內觀玉覺覺一念起即須除滅隨起隨滅務令安靜雖非的有貪著浮浮亂想亦盡滅除晝夜勤行須臾不替唯滅動心不滅照心但冥虛心不冥有心不依一法而心常性此法玄妙利益甚深常默元氣不傷少思慧燭內光不怒百神和暢不惱心地清涼不求無諂無驕不執可圓可方不貪便是富貴不苟何懼君王味絶靈泉自降氣定真息自長觸則形斃神游想則夢離尸僵氣漏形歸后土念漏神趨死鄉心苑方得神活魄減然後魂强轉物難窮妙理應化不離真常至精潜于恍惚大象緄于渺茫造化不知規準鬼神莫測行藏不飲不食不深是謂真人坐忘孫真人天地之間人為貴頭象天兮定象地父母遺體能寶之洪範九疇壽為最衛生切要知三戒大怒大欲併大醉三者若還有一馬須防損失真元氣欲求長生須戒性火不出兮心自足木還去火不成灰人能戒性還延命貪欲無窮忘却精用心不已失元神勞形散盡中和氣更仗何因保此身怒甚偏傷氣思多太損神神疲心易役氣弱病相縈勿使悲歡極常令酒食均再三防夜醉第一戒最嗔亥寢鳴雲鼓寅晨潄玉津妖邪難犯己精氣自全真若要無諸病常常節五辛安神宣悅樂惜氣保和純壽夭體論命修持本在人君能尊此理平地可朝真又逸曹仙姑神是性兮氣是命神不外馳氣自定本來二物互相親失却將何為本柄重陽師祖棄了惺惺學得癡到無為處無不為眼前世事只如此耳畔風雷逈不知兩腳任從行處去一靈常與氣相隨有時四大薰薰醉借問青天我是誰理性如調琴緊則有斷慢則不應慢得中則琴和矣又如鑄劔鋼則折錫多則卷鋼錫得中則劔成矣欲界色界無色界此三界也心忘念慮即超欲界心忘緣境即超色界心不著空即超無色界離此三界神居仙聖之鄉性在清虛之境矣李靖庵心歸虛寂身入無為動靜兩忘內外合一到這裡精自然化氣氣自然化神神自然還虛無心真人心田清靜性地和平端念正身不離當處神歸氣復性定精凝魄魄混融陰陽交媾丹田有寶對境無心一氣歸根萬神朝祖沉沉默默捧捧存存兀兀騰騰綿綿相續方是修行底活計辨道底家風石杏林萬物生皆死元神死復生以神居氣內丹道自然成心天無點翳性地絶塵飛夜靜月明處一聲春鳥啼施肩吾氣本延年藥心為使氣神能知行氣主便可作真人張紫陽含眼光凝耳韻調鼻息緘舌氣是謂和合四象眼不視而魂在肝耳不聽而精在腎舌不味而神在心鼻不香而魂在肺四肢不動而意在脾是謂五氣朝元精化為氣氣化為神神化為虛是謂三花聚頂虛無生白雪寂靜發黃芽玉爐火溫濕鼎上飛紫霞華地蓮花開神水金波淨夜深月正明天地一輪鏡龍從東海來虎向西山起兩獸戰一場化作天地髓大道元來一也無若能守一我神居此心塋若潭心月不滯絲毫真自如水火從來一處居看時覺有覓時無細心調燮文兼武片餉教君結玉酥心者神之舍目者神之牖目之所至心亦至焉故內煉之法以目視鼻以鼻對臍降心火入於氣海功夫只在片餉而已海上道人但向起時作還於作處收交龍莫放睡雷雨直須休要會無窮火常觀未盡油夜深人散後唯有一燈留朱紫陽靜極而噓如春沼魚動極而吸如百蟲蟄春魚得氣而動其動極微寒蟲含氣而蟄其蟄無朕調息者須似之綿綿密密幽幽微微呼則百骸萬竅氣隨以出吸則百骸萬竅氣隨以入調之不廢真氣從生藥物之老嫩浮沉火候之文武進退皆于真氣中求之嗚呼盡矣談景升悲則兩淚辛則兩涕憤則結癭恕則結疽心之所欲氣之所屬無所不育邪句為此正必為彼是以大人節悲辛誡憤怒得灝氣之門所以收其根知元神之囊所以韜其光若𧉻內守若石內藏所以為珠玉之房忘形以養氣忘氣以養神忘神以養虛只此忘之一字便是無物景界六祖云本來無一物何處惹塵埃其謂是歟魏伯陽耳乃精竅目乃神竅口乃氣竅若耳逑于聲便精從聲耗而不固目蕩於色便神從色散而不凝口多言語便氣從言走而不聚安得打成一片以為丹寒修行之人若不于此三寶關鍵收拾向裏無有是處今人精從下流氣從上散水火相背不得凝結皆是此心使然心苟愛念不生此精必不下流心苟忿念不生此氣必不上炎一念不生萬慮澄徹則水火自然交媾矣陳虛白混沌生前混沌圓個中消息不容傳擘開竅內竅中竅踏破天中天外天斗柄逆旋方有象台光返照始成仙一朝撈得渾心月覷破胡僧面壁禪夫神與氣精三品上藥煉精成氣煉氣化神煉神合道此七返九還之妙藥也然産藥有川源採藥有時節製藥有法度入藥有造化煉藥有火功西南有鄉土名黃庭恍惚有物杳冥有精分明一味水中金但向華池仔細尋此産藥之川源也垂簾塞兌窒欲調息離形去智幾于坐忘勸君終日默如愚煉成一顆如意珠此採藥之時節也天地之先無根靈草一意製度産成至寶大道不離方寸地功夫細密要行持此製藥之法度也心冲無心念中無念注意規中一氣還祖息息綿綿無間斷行行坐坐轉分明此入藥之造化也清淨藥材密意為先十二時中氣煉火煎金鼎常教湯用暖玉爐不使火少寒此煉藥之火功也採時為之藥藥中有火焉煉時為之火火中有藥焉能知藥而收火則定裏自丹成古詩云藥物陽內陰火候陰內陽會得陰陽理火藥一處詳此其義也必以神馭氣以氣定息呼吸出入任其自然專氣致柔含光默默行住坐綿綿若存如婦人之懷孕如小龍之養珠漸採漸煉漸疑漸結工夫純粹打成一斤動靜之間更宜消息念不可起起則火炎意不可散散則火泠但使操舍得中神氣相抱斯謂之火種相續丹鼎相溫煉之一刻一刻之周天也煉之一日一日之周天也無子午卯酉之法無晦朔弦望之期聖人傳藥不傳火之㫖盡于此矣丘長春青天莫起浮雲障雲起青天遮萬象萬象森羅鎮百邪光明不顯邪魔旺我初開廓天地清萬户千門歌太平有時一片黑雲起九竅百骸俱不寧是以長教慧風烈三界十方飄蕩徹雲散虛空體自真自然現出家家月月下方堪把笛吹一聲響亮振華夷驚起東方玉童子倒騎白鹿如星馳縱橫自在無拘束心不貪榮身不辱間唱壺中白雪歌靜調世外陽春曲我家此曲皆自然管無孔兮琴無絃得來驚覺浮生夢晝夜清音滿洞天氣無升降息定謂之真鉛念無生滅神凝謂之真汞息有一毫之不定形非我有散而歸陰非真鉛也念有一毫之不澄神不純陽散入鬼趣非真汞也翠玄真人煉氣徒施力存神枉用功豈知丹訣妙鎮日玩真空玉液滋神室金胎結氣樞只尋身內藥不用檢丹書火棗元無核交梨豈有查終朝行火候神水灌金花神氣歸根處身心復命時這般真孔竅料得少人知萬籟風初起千山月正圓急須行正令便可運周天雲散海棠月春深楊柳風阿誰知此意舉目問虛空紫霞山人丹即筌蹄道即魚忘筌得道證空虛莫堅守抱無為一撲碎虛空一也無妙有靈光常赫赫含容法界自如如隨緣應感常清淨九載金剛不壞軀抱一子耳不聽則坎水內澄目不視則離火內營口不言則兌金不鳴三者既閉則真人遊戲于其中陳泥丸修仙有三等煉丹有三成上品丹法以身為鉛以心為汞以定為水以慧為火在片餉之間可以凝結成胎中品丹法以氣為鉛以神為汞以午為火以子為水在百日之間可以混合成象下品丹法以精為鉛以血為汞以腎為水以心為火在一年之間可以融結成功李道純真鉛真汞大丹頭採取當干罔象求有作有為終有纍無求無執便無憂常清常淨心珠現忘物忘機命寶周動靜兩途無窒礙不離常處是瀛洲三元大藥意心身著意心身便係塵調息要調真息息煉神須要不神神頓忘物我三花聚猛棄機緣五氣臻八達四通無罣礙隨時隨處闡全真性天大察長根塵理路多通增業識聰明智惠不如愚雄辨高談爭似默絶慮忘機無是非隱耀含華遠聲色一念融通萬慮澄三心則透諸緣息諦觀三教聖人書息之一字最情直能於息上做工夫為佛為仙不勞力息緣返照禪之機息心明理儒之極息氣疑神道之玄三息相須無不克天來子欲撈北海波心月先縛南山嶺上雲若也有人知此意便堪飛舄見元君半輪月照西江上一箇烏飛北海頭月落為飛尋不見廣寒宫內倒騎牛玄牝之門鎮日開中間一竅混靈臺無關無鎖無人守日月東西自往來採藥要明天上月修行須識水中金月無庚氣金無水縱有真鉛枉用心無夢子身為車兮心為軾車動軾隨無計息交梨火棗是誰無自是不除荆與棘身為客兮心為主主人平和客安處若還主客不安寧精神管是辭君去龍眉子溟涬無光太極先風輪激動産真鉛都因靜極還生動便自無涯作有邊一氣本從虛里兆兩儀須從定中旋生生化化無窮盡幻作壺中一洞天紫虛了真子乾坤橐籥鼓有數離坎刀圭採有時鉛龍升兮汞虎降龜蛇上下兩相持天上日頭地下轉海底蟬娟天上飛乾坤日月本不運皆因斗柄轉其機人心若與天心合顛倒陰陽只片時虎龍戰罷三田靜拾取玄珠種在泥黃婆媒合入中宫嬰兒姹女相追年中用日日用刻裏工夫妙更奇暗合斗牛共歡會天機深遠少人知瑩蟾子抱元守一通玄竅惟精惟一明聖教太玄真一復命關是知一乃真常道休言得一萬事畢得一持一保勿失一徹萬融天理明萬法歸一非奇特始者一無生萬有無有相資可長久誠能萬有歸一無方會兩面觀北斗至此得一復忘一可與造化同出沒設若執一不能忘大似癡猫守空窟三五混一一返虛返虛之後虛亦無無無既無湛然寂西天鬍子沒髭鬚今人以無唤作茫然蕩頑空涉畏途今人以一唤作一偏枯苦執空費力不無之無若能會便于守一知無一一無兩字盡掀翻無一先生大事畢日用總玄玄時人識未全常推心上好放却口頭禪法法非空法傳傳是妄傳不曾修福始焉得有禍先不益便無損不變豈能遷草看嗔和喜何愁迍與邅不作善因果那得惡姻緣打開人我綱跳出是非圈休思今世後放下未生前既無塵俗纍何憂業火煎有無俱不立虛實任相連來去渾忘却生死何預焉飢來一捥飯渴則半甌泉興來自消遣困去且打眠達者明此義休尋天外天見前赤漉漉末後亮娟娟導引法閉目冥心坐握固靜思神叩齒三十六兩手抱崑崙左右鳴天鼓二十四度聞微擺撼天柱赤龍攪水津嗽津三十六神水滿口勻一口分三咽龍行虎自奔閉氣搓手熱背摩後精門盡此一口氣想火燒臍輪左右轆轤轉兩腳放舒伸叉手雙虛托低頭扳足頻以候逆水上再嗽再吞津如此三度畢神水九次吞咽下汨汨響百脉自調勻河車搬運訖發火遍燒身邪魔不敢近夢寐不能昏寒暑不能入灾病不能迍子午午前作造化合乾坤循環次第轉八卦是良因杜道堅至道不遠兮恆在目前竊天地之機兮修成胎仙妙莫妙兮凝吾之神安以待之兮若存而綿綿黃帝求玄珠兮彖罔乃得此理可心會兮非言所傳虛極靜篤兮恍惚變化絪緼蟠媾兮如煙雲之回旋龍吟虎嘯兮鉛汞交結依時採取兮進火烹煎劍挂南宫閉固神室煉成五色石兮補自己之青天結胎片餉兮運火一年如靈雞之抱卵兮萬慮俱捐轉天根月窟之關鍵兮往來上下融融液液兮真氣周匝乎三回勤而行之勿計得喪纍土成層臺兮積涓流而成川機緣難偶兮時不待人下手速兮愼毋待霜雪之滿巔許真人未開關空打坐無有麥子推甚磨枉勞神空錯過生死輪回躲不過開得關透得鎖三車搬運真水火湧泉直至泥丸宫縱橫自在都由我關未開鎖未動休胡扭捏莫胡弄自己性命固不得却去人間說鉛汞人人本有三關路夾春雙關透頂門修行正路此為根華池神水頻吞咽紫府元君逆上搬常使氣冲關節透自然精滿谷神存只願谷神長不死世間都是壽長人薛真人修養工夫顛倒顛行持造化坎離先池中玉液頻頻咽肘後金精轉轉還玄中妙妙中玄得此神丹益壽年谷關緊鎖真消息便是人間不老仙逍遙子父母未生前與母共相連十月胎在腹能動不能言晝夜毋呼吸往來通我玄無情生有情虛靈徹洞天剪斷臍帶子一點落根源性命歸真土此處覔真鉛時時防意馬刻刻鎖心猿迷失當來路輪回苦萬千若遇明師指說破妙中玄都來二十旬端的上青天丹田完固氣歸根氣聚神凝道台真久視定須從此始莫教虛度好無陰郤老扶裏别有方不須身外覔陰陽王關謹守嘗淵默氣固神完壽自康攝生要㫖眼者神之牖鼻者氣之户尾閭者精之路人多視則神耗多息則氣虛多嗜欲則精竭務須閉目以養神調息以養氣堅閉下元以養精精充則氣裕氣裕則神完是謂道家三寶覺與陽合寐與陰併覺多則魂强寐久則魄壯魂强者生之人魄壯者死之徒也故善養生者必餐元和减滋味使神清氣爽晝夜常醒是乃長生之道去暴怒以養性少思慮以養神省言語以養氣絶嗜欲以養精玄關雜記昔有行道人陌上見三叟年各百歲餘相與鋤禾莠往拜再三問何以得此壽上叟前致詞室內姬粗醜二叟前致詞夜飯减數口下叟前致詞暮卧不覆首㫖哉三叟言所以壽久口中言少心頭事少肚中食少夜間睡少依此四少神仙可了內養真詮老子曰綿綿若存謂之存則常在矣謂之若則非存矣故道家宗㫖以空洞無涯為元竅以知而不守為法則以一念不起為工夫檢盡丹經總不出此氣欲柔不欲强欲順不欲逆欲定不欲亂欲聚不欲散故道家最忌嗔心嗔心一發則氣强而不柔逆而霽順亂而不定散而不聚矣修道者須如光風密月景星慶雲無一毫乖戾之氣而後可行功用力修真祕録人心久任之則浩蕩而忘返頓棲之又超躍而無垠任之則榮乎我性棲之則勞乎我神致神者奚方而靜蓋心本至寧感物而動既習動而播遷亦習靜而恬晏故善習靜者將躁而制之以寧將邪而間之以正將求而抑之以恬將濁而澄之以清優哉游哉不欲不營行于是止於是造次於是逍遙於是久之則物冥於外神鑒於內不思靜而自靜矣修真之士先要降心若不降心焉能見性既不見性何以立命性命不備安得成真故降得一分欲心便存得一分道心心為五陽之主腎為五陰之主五陰升而為水五陽降而為火而臍在人身之中名曰中宫命府包藏精髓貫通氣脉善養者自離迸坎填離心息相依使二氣相交水火既濟自然一氣純陽身輕體健嬰兒之在母胎也母呼亦呼母吸亦吸口鼻皆閉而唯以臍通焉及其生也剪去臍帶則一點真元之氣聚於臍下故臍者生之根氣之蒂也人能虛心凝神回光內照於真人呼吸處隨其上下順其自然而存之心與息相依神與氣相守念念相續打成一片自然神氣歸根性命合人在氣中如魚在水中水以養魚而魚不知氣以養人而人不覺養氣者須自調息始調息之法先靜坐澄心宛若禪寂以目視鼻以鼻對臍調勻呼吸勿令喘急吸時氣自下而上呼時氣自上而下一上一下若存若亡毋令間斷亦毋令矜持但隨其出入少加調停爾人身元神常在於目五藏精華亦聚於目故陰符經曰機在目道德經曰不見可欲使心不亂是以內養之法常要兩目垂簾回光自照降心火於丹田使神藏於淵不致外馳自然神氣相抱長生可期冬至小參文身中一寶隱在丹田輕如密霧淡似飛烟上至泥丸下及湧泉乍聚乍散或方或圓表裏瑩徹左右回旋遇陰入地逢陽升天金翁採汞姹女擒鉛依時運用就內烹煎冬至之後夏至之前金鼎湯沸玉爐火燃龍吟東嶽虎嘯西川黃婆無為丁公默然身中夫婦雲雨交歡天一生水在乎清源離己坎戊以土為先土中有火妙在心傳如龍養珠波涵玉淵如雞抱卯暖氣綿綿磁石吸鐵自然通連花蒂含實核中氣全不守之守如一物存始由乎坎終至乎乾卯酉沐浴進退抽添有文有武可陶可甄聖胎既就一鏇三關却使河車運水登山三尸六賊膽碎心寒銀盂盛雪一色同觀玉壺涵水即成大還一聲雷電人在頂門青霄萬里蟾光一輪冬至詞因看斗柄運周天頓悟神仙妙訣一點真陽生坎位點却離宫之缺造化無聲水中起火妙在虛危穴今年冬至梅花衣舊凝雪先聖此日閉關不通來往都為群生設物物含生意正在子初亥末自古乾坤這些離坎日日無休歇如今識破金烏飛入蟾關玄牝歌華池神水天地根煉之餌之命長生自古神仙無則說皆因玄牝入真門借問如何是玄牝嬰兒未生先兩腎兩腎中間一點明逆則丹成順成人一陽起處便下手黑中取白無中有一時身內長黃芽九載三年徒自守世人若識真玄牝不在心兮不在腎窮取生身負受氣初莫怪天機輕泄盡修真口訣修真之要只在性命兩字離了性命便是旁門世人不知何者為養性洞賓以煉心曉之不知何者為立命張許以伏氣喻之心無所住方是真如此養性也氣入身來沉歸元海此立命也道家以精氣神三寶為丹頭然煉精之要在乎身身不動則無欲而精全煉氣之要在乎心心不動則無念而氣全煉神之要在乎意意不動則身心合而返虛故神全是故精氣神為三元藥物身心意為三元至要終
