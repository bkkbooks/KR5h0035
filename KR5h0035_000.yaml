front:
  text: 長生詮經卷第槐三
  hash: sha256:fdcc31c2c1d72e7bdc94d31459f49f627f1ac3786d34557a7ecb4896d17ffd00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5h0035_HFL_000-001a, image: hfl/1082/1082-004.png}
body:
  text: 清淨經夫人神好清而心擾之人心好靜而欲牽之常能遺其欲而心自靜澄其心而神自清内觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟唯見於空觀空亦空空無所空所空既無無無亦無無無亦無湛然常寂陰符經心生於物死於物機在目生者死之根死者生之根恩生於害害生於恩洞古經有動之動出於不動有爲之爲出於無爲無爲則神歸神歸則萬物云寂不動則氣泯則萬物無生忘於目則光溢無極泯於耳則心識常淵兩機俱忘衆妙之門養其無象象故常存守其無體體故全眞全眞相濟可以長生天得其眞故長地得其眞故久人得其眞故壽大通經靜爲之性心在其中矣動爲之心性在其中矣心生性滅心滅性現如空無象湛然圓滿大道無相故内不攝於有眞性無爲故外不生其心如如自然廣無邊際對境忘境不沉於六賊之魔居塵出塵不落於萬縁之化定觀經唯滅動心不滅照心但凝空心不凝住心有事無事常若無心處靜處喧其志唯一制而不着放而不動處喧無惡涉事無惱者此是眞定不以涉事無惱故求多事不以處喧無惡强來就喧以無事爲眞宅有爲爲應迹若水鏡之爲鑒則隨物而現形胎息經胎從伏氣中結氣從有胎中息氣入身來爲之生神去離形爲之死知神氣可以長生固守虚無以養神氣神行即氣行神住即氣住若欲長生神氣相注胎息銘三十六咽一咽爲先吐唯細細納唯綿綿坐卧亦爾行立坦然戒於喧雜忌以腥羶假名胎息實曰内丹非止治病决定延年久久行之名列上仙太上日用經日用飲食禁口端坐莫起一念萬慮俱忘存神定意眼不視物耳不聽聲一心内守調息綿綿漸漸呼出莫教間斷似有若無自然心火下降腎水上升口裏津生靈眞附體得至長生十二時中常要清淨神是氣之子氣是神之母如鷄抱卵存神養氣能無離乎心印經上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃刻而成回風混合百日功靈默朝上帝一紀飛昇水火眞經欲從心起息從心定心息相依息調心靜文始經心感物不生心生精功交心不生物生識物尚非眞何况於識識尚非眞何况於情目視琱琢者明愈傷耳聞文響者聦愈傷心思玄妙者心愈傷以神存氣以氣存形所以延形合形於神合氣於氣所以隱形吸氣以養其和孰能飢之存神以滋其煖孰能寒之洞靈經導筋骨則形全剪情欲則神全靖言語則福全保此三全是謂聖賢玉樞經道者以誠而入以默而守以柔而用用誠似愚用默似訥用柔似拙入道者知止守道者知謹用道者知微能知微則慧光生能知謹則聖知全能知上則泰安定冲虚經務外遊不如務内觀外遊者求備於物内觀者取足於身至游者不知所適至觀者不知所眡神遇爲夢形接爲事晝想夜夢神形所交故神凝者想夢自消南華經山木自宼也膏火自煎也桂可食故伐之可用故割之人皆知有用之用而莫知無用之用也至道之精窈窈冥冥至道之極昏昏默默無勞女形無摇女精乃可長生目無所見耳無所聞心無所知女神將守形形乃長生三茅眞經谷虚應聲心虚應神神虚應氣氣虚應精虚極則明明極則瑩超乎精神而無死生精從内守氣自外生以氣取精可以長生衛生經精氣神爲内三寳耳目口爲外三寳當使内三寳不逐物而流外三寳不誘中而擾洞神眞經寵辱不驚肝木自寧動靜以敬心火自定飲食有節脾土不泄調息寡言肺金自全恬靜無欲腎水自足元道眞經草木根生去土則死魚鱉沉生去水則死人以形生去氣則死是故聖人知氣之所在以爲身寳漢天師語虚無大道清淨希夷不染曰清不動曰淨不視曰希不聽曰夷勤此四者可免輪廻純陽眞人一日清閑一日僊六神和合自安然丹田有寳休尋道對境無心莫問禪養氣忘言守降心爲不爲動靜知宗祖無事更尋誰眞常湏應物應物要不迷不迷性自住性住氣自回氣回丹自結壺中配坎離陰陽生返復普化一聲雷白雲朝頂上甘露洒湏彌自飲長生酒逍遥誰得知坐聽無絃曲明通造化機都來二十句端的上天梯虚靜天師不怕念起惟恐覺遲念起是病不續是藥有定主無常應心欲死機欲活大道不遠在身中萬物皆空性不空性若不空和氣住氣歸元海壽無窮欲得身中神不出莫向靈臺留一物物在心中神不清耗散眞精損筋骨元神一岀便收來神返身中氣自回如此朝朝併暮暮自然赤子産眞胎李眞人一吸便提氣氣歸臍一提便咽水火相見三茅眞君靈臺湛湛似氷壺只許元神在裡居若向此中留一物豈能證道合清虚寒山子冬則朝勿饑夏則夜勿飽早起不在鷄鳴前晩起不過日岀後心内澄則眞人守其位氣内定則邪穢去其身玉虚子物物元無物心非形亦非二般觀曉悟悟者不知誰無無蔵妙有有有現眞空湛然俱不立常寂性融融中黄眞人天門常開地户湏閉息息綿綿勿令暫廢吸至於根呼至於蒂子謂之神母謂之氣如鷄抱𡖉似魚在水結就聖胎自然蟬蛻馬丹陽道性雖無修無證塵心要日損日消消到忘心忘性方𢍆無修無證煉氣作生涯怡神爲日用常教龍虎調不使馬猿美性定則情忘形虚則氣運心死則神活陽盛則陰衰修心要作長生客煉性當爲活死人玄關秘論心牽于事火動于中心火既動眞精必摇故當死心以養氣息機以死心無心干事則無事於心故心靜生慧心動生昏郝太古境殺心則凡心殺境則仙靜處煉氣鬧處煉神王棲雲心隨境轉境逐心生若要心定世人愛的我不愛世人做的我不做紅塵萬縁勾引不動自然心清意靜陰陽不能陶鑄遣慾澄心亦是心將心擒慾慾應深爭如不起群迷念方現無中百煉金白玉蟾大道以無心爲體忘言爲用柔弱爲本清淨爲基薄滋味以養氣去嗔怒以養性處卑下以養德守清淨以養道眞火本無候大藥不計斤蓋神既火氣即藥以火煉藥而成丹即以神馭氣而成道也使神馭氣使氣歸神不過回光返照收拾念頭之一法耳夫金丹者採二八兩之藥結三百日之胎心上工夫不在吞津嚥氣先天造化要湏聚氣凝神皆要行持湏憑口訣至簡至易非繁非難無中養就嬰兒陰内煉成陽氣使金公生擒活虎令姹女獨駕赤龍乾夫坤婦而媒假黄婆離女坎男而結成赤子一爐火焰煉虚空化作微塵萬頃氷壺照世界大如黍米神歸四大即龜蛇交合之時氣入四肢是烏兔鬱羅之處玉葫蘆迸出黄金之液金菡萏開成白玉之花正當風泠月明時誰會山青水緑意快活快活眞快活虚空粉碎秋毫末輪廻生死幾千遭這回大死今方活舊時窠舊潑生涯于今淨盡都掉脫元來爹爹只是爺懵懵懂懂自瓜葛近來仿佛辨西東七七依前四十八如龍養珠心不忘如鷄抱邜氣不絶又似寒蟬吸曉風又似老蚌含秋月一箇閑人天地間大笑一聲天地闊我有明珠光爍爍照破三千大千國觀音菩薩正定心釋迦如來大圓覺或如春色媚山河或似秋光爽巖壑亦名九轉大還丹又謂長生不死藥墻璧瓦礫相渾融水鳥𣗳林共寥廓缺唇石女駕土牛跛脚木人騎紙鶴三業三毒雲去來六根六塵月綽約此珠價大實難酬不許巧錐妄穿鑿若要秘密大總持寂滅之中閉摸索幾多衲子聽蟄雷我個道人藏尺蠖茫茫盡向珠外求不識先天那一著那一著何須重注脚杜宇聲隨曉雨啼海棠夜聽東風落烏兔乾坤鼎龜蛇復姤壇世問無事客心内大還丹白虎水中吼青龍火裏蟠汞鉛泥蕊艷金木雪花寒離坎非心賢東西不肺肝三旬窮七返九轉出泥丸司馬眞人夫欲修眞先除邪行外事都絶無以於心然後内觀玉覺覺一念起即須除滅隨起隨滅務令安靜雖非的有貪著浮浮亂想亦盡滅除晝夜勤行須臾不替唯滅動心不滅照心但冥虚心不冥有心不依一法而心常性此法玄妙利益甚深常默元氣不傷少思慧燭内光不怒百神和暢不惱心地清涼不求無諂無驕不執可圓可方不貪便是富貴不苟何懼君王味絶靈泉自降氣定眞息自長觸則形斃神游想則夢離屍僵氣漏形歸后土念漏神趨死鄉心苑方得神活魄減然後魂强轉物難窮妙理應化不離眞常至精潜于恍惚大象緄于渺茫造化不知規準鬼神莫測行藏不飲不食不深是謂眞人坐忘孫眞人天地之間人爲貴頭象天兮定象地父母遺體能寳之洪範九疇壽爲最衛生切要知三戒大怒大慾併大醉三者若還有一馬須防損失眞元氣欲求長生須戒性火不出兮心自足木還去火不成灰人能戒性還延命貪欲無窮忘却精用心不已失元神勞形散盡中和氣更仗何因保此身怒甚偏傷氣思多太損神神疲心易役氣弱病相縈勿使悲歡極常令酒食均再三防夜醉第一戒最嗔亥寢鳴雲鼓寅晨潄玉津妖邪難犯己精氣自全眞若要無諸病常常節五辛安神宣悅樂惜氣保和純壽夭體論命修持本在人君能尊此理平地可朝眞又逸曹仙姑神是性兮炁是命神不外馳氣自定本來二物互相親失却將何爲本柄重陽師祖棄了惺惺學得癡到無爲處無不爲眼前世事只如此耳畔風雷逈不知兩脚任從行處去一靈常與氣相隨有時四大薰薰醉借問青天我是誰理性如調琴緊則有斷慢則不應慢得中則琴和矣又如鑄劔鋼則折錫多則卷鋼錫得中則劔成矣欲界色界無色界此三界也心忘念慮即超欲界心忘縁境即超色界心不着空即超無色界離此三界神居仙聖之鄉性在清虚之境矣李靖庵心歸虚寂身入無爲動靜兩忘内外合一到這裡精自然化氣氣自然化神神自然還虚無心眞人心田清靜性地和平端念正身不離當處神歸氣復性定精凝魄魄混融陰陽交媾丹田有寳對境無心一氣歸根萬神朝祖沉沉默默捧捧存存兀兀騰騰綿綿相續方是修行底活計辨道底家風石杏林萬物生皆死元神死復生以神居氣内丹道自然成心天無點翳性地絶塵飛夜靜月明處一聲春鳥啼施肩吾氣本延年藥心爲使氣神能知行氣主便可作眞人張紫陽含眼光凝耳韻調鼻息緘舌氣是謂和合四象眼不視而魂在肝耳不聽而精在腎舌不味而神在心鼻不香而魂在肺四肢不動而意在脾是謂五氣朝元精化爲氣氣化爲神神化爲虚是謂三花聚頂虚無生白雪寂靜發黄芽玉爐火温濕鼎上飛紫霞華地蓮花開神水金波淨夜深月正明天地一輪鏡龍從東海來虎向西山起兩獸戰一場化作天地髓大道元來一也無若能守一我神居此心塋若潭心月不滯絲毫眞自如水火從來一處居看時覺有覓時無細心調燮文兼武片餉教君結玉酥心者神之舍目者神之牖目之所至心亦至焉故内煉之法以目視鼻以鼻對臍降心火入於氣海功夫只在片餉而已海上道人但向起時作還於作處收交龍莫放睡雷雨直湏休要會無窮火常觀未盡油夜深人散後唯有一燈留朱紫陽靜極而嘘如春沼魚動極而吸如百蟲蟄春魚得氣而動其動極微寒蟲含氣而蟄其蟄無朕調息者須似之綿綿密密幽幽微微呼則百骸萬竅氣隨以出吸則百骸萬竅氣隨以入調之不廢眞氣從生藥物之老嫩浮沉火候之文武進退皆于眞氣中求之嗚呼盡矣譚景昇悲則兩淚辛則兩涕憤則結癭恕則結疽心之所欲氣之所屬無所不育邪句爲此正必爲彼是以大人節悲辛誡憤怒得灝氣之門所以收其根知元神之囊所以韜其光若𧉻内守若石内藏所以爲珠玉之房忘形以養氣忘氣以養神忘神以養虚只此忘之一字便是無物景界六祖云本來無一物何處惹塵埃其謂是歟魏伯陽耳乃精竅目乃神竅口乃氣竅若耳逑于聲便精從聲耗而不固目蕩於色便神從色散而不凝口多言語便氣從言走而不聚安得打成一片以爲丹寒修行之人若不于此三寳關鍵收拾向裏無有是處今人精從下流炁從上散水火相背不得凝結皆是此心使然心苟愛念不生此精必不下流心苟忿念不生此炁必不上炎一念不生萬慮澄徹則水火自然交媾矣陳虚白混沌生前混沌圓個中消息不容傳擘開竅内竅中竅踏破天中天外天斗柄逆旋方有象台光返照始成仙一朝撈得渾心月覷破胡僧面壁禪夫神與氣精三品上藥煉精成氣煉氣化神煉神合道此七返九還之妙藥也然産藥有川源採藥有時節製藥有法度入藥有造化煉藥有火功西南有鄉土名黄庭恍惚有物杳冥有精分明一味水中金但向華池仔細尋此産藥之川源也垂簾塞兌窒慾調息離形去智幾于坐忘勸君終日默如愚煉成一顆如意珠此採藥之時節也天地之先無根靈草一意製度産成至寳大道不離方寸地功夫細密要行持此製藥之法度也心冲無心念中無念注意規中一炁還祖息息綿綿無間断行行坐坐轉分明此入藥之造化也清淨藥材密意爲先十二時中炁煉火煎金鼎常教湯用暖玉爐不使火少寒此煉藥之火功也採時爲之藥藥中有火焉煉時爲之火火中有藥焉能知藥而收火則定裏自丹成古詩云藥物陽内陰火候陰内陽會得陰陽理火藥一處詳此其義也必以神馭氣以氣定息呼吸出入任其自然專炁致柔含光默默行住坐綿綿若存如婦人之懷孕如小龍之養珠漸採漸煉漸疑漸結工夫純粹打成一斤動靜之間更宜消息念不可起起則火炎意不可散散則火泠但使操舍得中神炁相抱斯謂之火種相續丹鼎相温煉之一刻一刻之周天也煉之一日一日之周天也無子午卯酉之法無晦朔弦望之期聖人傳藥不傳火之㫖盡于此矣丘長春青天莫起浮雲障雲起青天遮萬象萬象森羅鎮百邪光明不顯邪魔旺我初開廓天地清萬户千門歌太平有時一片黑雲起九竅百骸俱不寧是以長教慧風烈三界十方飄蕩徹雲散虚空體自眞自然現出家家月月下方堪把笛吹一聲響亮振華夷驚起東方玉童子倒騎白鹿如星馳縱横自在無拘束心不貪榮身不辱閑唱壺中白雪歌靜調世外陽春曲我家此曲皆自然管無孔兮琴無絃得來驚覺浮生夢晝夜清音滿洞天炁無升降息定謂之眞鉛念無生滅神凝謂之眞汞息有一毫之不定形非我有散而歸陰非眞鉛也念有一毫之不澄神不純陽散入鬼趣非眞汞也翠玄眞人煉氣徒施力存神枉用功豈知丹訣妙鎮日翫眞空玉液滋神室金胎結氣樞只尋身内藥不用檢丹書火棗元無核交梨豈有查終朝行火候神水灌金花神氣歸根處身心復命時這般眞孔竅料得少人知萬籟風初起千山月正圓急須行正令便可運周天雲散海棠月春深楊柳風阿誰知此意舉目問虚空紫霞山人丹即筌蹄道即魚忘筌得道證空虚莫堅守抱無爲一撲碎虚空一也無妙有靈光常赫赫含容法界自如如隨縁應感常清淨九載金剛不壞軀抱一子耳不聽則坎水内澄目不視則離火内營口不言則兌金不鳴三者既閉則眞人遊戲于其中陳泥丸修仙有三等煉丹有三成上品丹法以身爲鉛以心爲汞以定爲水以慧爲火在片餉之間可以凝結成胎中品丹法以氣爲鉛以神爲汞以午爲火以子爲水在百日之間可以混合成象下品丹法以精爲鉛以血爲汞以腎爲水以心爲火在一年之間可以融結成功李道純眞鉛眞汞大丹頭採取當干罔象求有作有爲終有累無求無執便無憂常清常淨心珠現忘物忘機命寳周動靜兩途無窒碍不離常處是瀛洲三元大藥意心身着意心身便係塵調息要調眞息息煉神須要不神神頓忘物我三花聚猛棄機縁五氣臻八達四通無罣礙隨時隨處闡全眞性天大察長根塵理路多通增業識聦明智惠不如愚雄辯高譚爭似嘿絶慮忘機無是非隱耀含華遠聲色一念融通萬慮澄三心則透諸縁息諦觀三教聖人書息之一字最情直能於息上做工夫爲佛爲仙不勞力息縁返照禪之機息心明理儒之極息氣疑神道之玄三息相須無不克天來子欲撈北海波心月先縛南山嶺上雲若也有人知此意便堪飛舄見元君半輪月照西江上一箇烏飛北海頭月落爲飛尋不見廣寒宫内倒騎牛玄牝之門鎮日開中間一竅混靈臺無關無鎻無人守日月東西自徃來採藥要明天上月修行湏識水中金月無庚氣金無水縱有眞鉛枉用心無夢子身爲車兮心爲軾車動軾隨無計息交梨火棗是誰無自是不除荆與棘身爲客兮心爲主主人平和客安處若還主客不安寧精神管是辭君去龍眉子溟涬無光太極先風輪激動産眞鉛都因靜極還生動便自無涯作有邊一氣本從虚里兆兩儀湏從定中旋生生化化無窮盡幻作壺中一洞天紫虚了眞子乾坤橐籥鼓有數離坎刀圭採有時鉛龍升兮汞虎降龜蛇上下兩相持天上日頭地下轉海底蟬娟天上飛乾坤日月本不運皆因斗柄轉其機人心若與天心合顛倒陰陽只片時虎龍戰罷三田靜拾取玄珠種在泥黄婆媒合入中宫嬰兒姹女相追年中用日日用刻裏工夫妙更奇暗合斗牛共歡會天機深遠少人知瑩蟾子抱元守一通玄竅惟精惟一明聖教太玄眞一復命關是知一乃眞常道休言得一萬事畢得一持一保勿失一徹萬融天理明萬法歸一非奇特始者一無生萬有無有相資可長久誠能萬有歸一無方會兩面觀北斗至此得一復忘一可與造化同出没設若執一不能忘大似癡猫守空窟三五混一一返虚返虚之後虚亦無無無既無湛然寂西天鬍子没髭鬚今人以無唤作茫然蕩頑空涉畏途今人以一唤作一偏枯苦執空費力不無之無若能會便于守一知無一一無兩字盡掀翻無一先生大事畢日用總玄玄時人識未全常推心上好放却口頭禪法法非空法傳傳是妄傳不曾修福始焉得有禍先不益便無損不變豈能遷草看嗔和喜何愁迍與邅不作善因果那得惡姻縁打開人我綱跳出是非圈休思今世後放下未生前既無塵俗累何憂業火煎有無俱不立虚實任相連來去渾忘却生死何預焉飢來一捥飯渴則半甌泉興來自消遣困去且打眠達者明此義休尋天外天見前赤漉漉末後亮娟娟導引法閉目冥心坐握固靜思神叩齒三十六兩手抱崑崙左右鳴天鼓二十四度聞微擺撼天柱赤龍攪水津嗽津三十六神水滿口匀一口分三嚥龍行虎自奔閉氣搓手熱背摩後精門盡此一口氣想火燒臍輪左右轆轤轉兩脚放舒伸叉手雙虚托低頭扳足頻以候逆水上再嗽再吞津如此三度畢神水九次吞嚥下汨汨響百脉自調匀河車搬運訖發火遍燒身邪魔不敢近夢寐不能昏寒暑不能入灾病不能迍子午午前作造化合乾坤循環次第轉八卦是良因杜道堅至道不遠兮恒在目前竊天地之機兮修成胎仙妙莫妙兮凝吾之神安以待之兮若存而綿綿黄帝求玄珠兮彖罔乃得此理可心會兮非言所傳虚極靜篤兮恍惚變化絪緼蟠媾兮如煙雲之回旋龍吟虎嘯兮鉛汞交結依時採取兮進火烹煎劍挂南宫閉固神室煉成五色石兮補自己之青天結胎片餉兮運火一年如靈鷄之抱卵兮萬慮俱捐轉天根月窟之關鍵兮徃來上下融融液液兮眞氣周匝乎三回勤而行之勿計得喪累土成層臺兮積涓流而成川機縁難偶兮時不待人下手速兮愼毋待霜雪之滿巔許眞人未開關空打坐無有麥子推甚磨枉勞神空錯過生死輪廻躲不過開得關透得鎻三車搬運眞水火湧泉直至泥丸宫縱横自在都由我關未開鎻未動休胡扭捏莫胡弄自己性命固不得却去人間說鉛汞人人本有三關路夾春雙關透頂門修行正路此爲根華池神水頻吞咽紫府元君逆上搬常使氣冲關節透自然精滿谷神存只願谷神長不死世間都是壽長人薛眞人修養工夫顛倒顛行持造化坎離先池中玉液頻頻嚥肘後金精轉轉還玄中妙妙中玄得此神丹益壽年谷關緊鎻眞消息便是人間不老仙逍遥子父母未生前與母共相連十月胎在腹能動不能言晝夜毋呼吸徃來通我玄無情生有情虚靈徹洞天剪斷臍帶子一點落根源性命歸眞土此處覔眞鉛時時防意馬刻刻鎻心猿迷失當來路輪廻苦萬千若遇明師指說破妙中玄都來二十旬端的上青天丹田完固氣歸根氣聚神凝道台眞久視定湏從此始莫教虚度好无陰郤老扶裏别有方不湏身外覔陰陽王關謹守嘗淵默氣固神完壽自康攝生要㫖眼者神之牖鼻者氣之户尾閭者精之路人多視則神耗多息則氣虚多嗜慾則精竭務湏閉目以養神調息以養氣堅閉下元以養精精充則氣裕氣裕則神完是謂道家三寳覺與陽合寐與陰併覺多則魂强寐久則魄壯魂强者生之人魄壯者死之徒也故善養生者必餐元和减滋味使神清氣爽晝夜常醒是乃長生之道去暴怒以養性少思慮以養神省言語以養氣絶嗜慾以養精玄關雜記昔有行道人陌上見三叟年各百歲餘相與鋤禾莠徃拜再三問何以得此壽上叟前致詞室内姬粗醜二叟前致詞夜飯减數口下叟前致詞暮卧不覆首㫖哉三叟言所以壽久口中言少心頭事少肚中食少夜間睡少依此四少神仙可了内養眞詮老子曰綿綿若存謂之存則常在矣謂之若則非存矣故道家宗㫖以空洞無涯爲元竅以知而不守爲法則以一念不起爲工夫檢盡丹經總不出此氣欲柔不欲强欲順不欲逆欲定不欲亂欲聚不欲散故道家最忌嗔心嗔心一發則氣强而不柔逆而霽順亂而不定散而不聚矣修道者須如光風密月景星慶雲無一毫乖戾之氣而後可行功用力修眞秘録人心久任之則浩蕩而忘返頓棲之又超躍而無垠任之則榮乎我性棲之則勞乎我神致神者奚方而靜蓋心本至寧感物而動既習動而播遷亦習靜而恬晏故善習靜者將躁而制之以寧將邪而閑之以正將求而抑之以恬將濁而澄之以清優哉游哉不欲不營行于是止於是造次於是逍遥於是久之則物冥於外神鑒於内不思靜而自靜矣修眞之士先要降心若不降心焉能見性既不見性何以立命性命不備安得成眞故降得一分欲心便存得一分道心心爲五陽之主腎爲五陰之主五陰升而爲水五陽降而爲火而臍在人身之中名曰中宫命府包蔵精髓貫通氣脉善養者自離迸坎填離心息相依使二氣相交水火既濟自然一氣純陽身輕體健嬰兒之在母胎也母呼亦呼母吸亦吸口鼻皆閉而唯以臍通焉及其生也剪去臍帶則一點眞元之氣聚於臍下故臍者生之根氣之蒂也人能虚心凝神回光内照於眞人呼吸處隨其上下順其自然而存之心與息相依神與氣相守念念相續打成一片自然神氣歸根性命合人在氣中如魚在水中水以養魚而魚不知氣以養人而人不覺養氣者須自調息始調息之法先靜坐澄心宛若禪寂以目視鼻以鼻對臍調匀呼吸勿令喘急吸時氣自下而上呼時氣自上而下一上一下若存若亡毋令間斷亦毋令矜持但隨其出入少加調停爾人身元神常在於目五蔵精華亦聚於目故陰符經曰機在目道德經曰不見可欲使心不亂是以内養之法常要兩目垂簾廻光自照降心火於丹田使神蔵於淵不致外馳自然神氣相抱長生可期冬至小叅文身中一寳隱在丹田輕如密霧澹似飛烟上至泥丸下及湧泉乍聚乍散或方或圓表裏瑩徹左右回旋遇陰入地逢陽昇天金翁採汞姹女擒鉛依時運用就内烹煎冬至之後夏至之前金鼎湯沸玉爐火燃龍吟東岳虎嘯西川黄婆無爲丁公默然身中夫婦雲雨交歡天一生水在乎清源離己坎戊以土爲先土中有火妙在心傳如龍養珠波涵玉淵如鷄抱卯暖氣綿綿磁石吸鐵自然通連花蒂含實核中氣全不守之守如一物存始由乎坎終至乎乾卯酉沐浴進退抽添有文有武可陶可甄聖胎既就一鏇三關却使河車運水登山三尸六賊膽碎心寒銀盂盛雪一色同觀玉壺涵水即成大還一聲雷電人在頂門青霄萬里蟾光一輪冬至詞因看斗柄運周天頓悟神仙妙訣一點眞陽生坎位點却離宫之缺造化無聲水中起火妙在虚危穴今年冬至梅花衣舊凝雪先聖此日閉關不通來徃都爲群生設物物含生意正在子初亥末自古乾坤這些離坎日日無休歇如今識破金烏飛入蟾關玄牝歌華池神水天地根煉之餌之命長生自古神仙無則說皆因玄牝入眞門借問如何是玄牝嬰兒未生先兩腎兩腎中間一點明逆則丹成順成人一陽起處便下手黑中取白無中有一時身内長黄芽九載三年徒自守世人若識眞玄牝不在心兮不在腎窮取生身負受氣初莫怪天機輕洩盡修眞口訣修眞之要只在性命兩字離了性命便是旁門世人不知何者爲養性洞賓以煉心曉之不知何者爲立命張許以伏氣喻之心無所住方是眞如此養性也氣入身來沉歸元海此立命也道家以精氣神三寳爲丹頭然煉精之要在乎身身不動則無欲而精全煉氣之要在乎心心不動則無念而氣全煉神之要在乎意意不動則身心合而返虚故神全是故精氣神爲三元藥物身心意爲三元至要終
